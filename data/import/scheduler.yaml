preprocessing:
  enable_visualizations: false
  fill_missing_students: true
  student_cap: 300
  normalise_teacher_names: true
  normalise_department_names: true
  deduplicate_courses: true

grouping:
  strategy: exact
  max_groups_per_dept_sem: 6
  hall_theorem_tolerance: 0.05
  consecutive_lab_pairs: true
  random_seed: 42
  # Fine-grained control for the "maximize courses into one group" behaviour.
  #
  # - If empty / not provided: consolidation is enabled for semesters 5 & 7 for ALL departments.
  # - If non-empty: consolidation is enabled ONLY for the cohorts listed here.
  #
  # Supported formats:
  # - "<Department Name>|<semester>" (e.g., "Information Technology|5")
  # - "<Department Name>_S<semester>" (e.g., "Information Technology_S5")
  # - "<department_slug>_s<semester>" (matches DepartmentSemesterKey.slug())
  # Wildcards: "*|5" or "Information Technology|*".
  consolidation_dept_sem_allowlist: 
    - Information Technology_S3
    - Computer Science & Design_S3
    - Computer Science & Business Systems_S3
    - Artificial Intelligence & Machine Learning_S3
    - Artificial Intelligence & Data Science_S3
    - Computer Science & Engineering (Cyber Security)_S3
    - Computer Science & Engineering_S5
    - Information Technology_S5
    - Artificial Intelligence & Machine Learning_S5
    - Artificial Intelligence & Data Science_S5
    - Computer Science & Business Systems_S5
    - Computer Science & Design_S5
    - Computer Science & Engineering (Cyber Security)_S5
    - Electrical & Electronics Engineering_S5
    - Electronics & Communication Engineering_S5
    - Mechanical Engineering_S5

constraints:
  lab:
    session_coverage:
      enabled: true
      priority: 10
      weight: 1.0
      params: {}
    first_year_computer_lab_rooms:
