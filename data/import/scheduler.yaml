      params:
        allowed_rooms:
          - DG02
          - DG03
          - TIFAC I01
          - C401
        target_semesters:
          - 1
        room_keywords:
          - computer
    room_capacity:
      enabled: true
      priority: 9
      weight: 1.0
      params: {}
    room_single_assignment:
      enabled: true
      priority: 9
      weight: 1.0
      params:
        # Soft preference: avoid using 140-cap rooms for a single 60-75 batch.
        # Higher values push the solver to co-schedule pairs (when possible).
        medium_underfill_penalty_weight: 25
        # Soft preference: discourage mixing medium batches with other batch sizes
        # for the same course code in a 140 room slot.
        medium_mixing_penalty_weight: 10

    special_course_time_blocks:
      enabled: true
      priority: 9
      weight: 1.0
      params:
        rules:
          - course_codes:
              - CS23431
              - CB23431
            blocked_days:
